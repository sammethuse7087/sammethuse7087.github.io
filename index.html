        // ----- Helper: Render Section with checkboxes -----
        function renderSection(containerId, items, showLoginBadge = false) {

            if (!container) return;
            container.innerHTML = '';

                const div = document.createElement('div');
                div.className = 'link-item';
                
                let icon = '🔗';
                const n = item.name.toLowerCase();
                if (n.includes('rumble')||n.includes('vimeo')||n.includes('dailymotion')) icon = '🎬';
                else if (n.includes('drive')||n.includes('mega')||n.includes('dropbox')||n.includes('cloud')) icon = '☁️';
                else if (n.includes('download')||n.includes('mediafire')) icon = '⬇️';
                else icon = '📁';

                const loginTag = showLoginBadge ? '<span class="notice-tag">Login required</span>' : '';

                // Unique ID for checkbox based on URL (simplified)
                const checkboxId = `chk_${containerId}_${index}`;
                
                div.innerHTML = `
                    <div class="link-checkbox">
                        <input type="checkbox" class="link-check" id="${checkboxId}" data-url="${item.url}" data-name="${item.name}" data-section="${containerId}">
                    </div>
                    <div class="link-info">
                        <span class="platform-icon">${icon}</span>
                        <div class="link-details">

                            <div class="link-url">${item.url}</div>
                        </div>
                    </div>
                    <div class="actions">

                        <button class="btn copy-btn" data-url="${item.url}">Copy</button>
                        <button class="btn btn-share share-btn" data-url="${item.url}" data-title="${item.name}">Share</button>
                    </div>
                `;
                container.appendChild(div);
            });

            // Attach single copy/share listeners
            container.querySelectorAll('.copy-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const url = btn.getAttribute('data-url');
                    try {
                        await navigator.clipboard.writeText(url);
                        btn.textContent = '✓ Copied';
                        setTimeout(() => btn.textContent = 'Copy', 1500);
                    } catch {
                        alert('Unable to copy');
                    }
                });
            });

            container.querySelectorAll('.share-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const url = btn.getAttribute('data-url');
                    const title = btn.getAttribute('data-title');
                    if (navigator.share) {
                        try {
                            await navigator.share({ title, text: `Check out: ${title}`, url });
                        } catch (err) {
                            if (err.name !== 'AbortError') fallbackCopy(url, btn);
                        }
                    } else {
                        fallbackCopy(url, btn);
                    }
                });
            });

            function fallbackCopy(url, button) {
                navigator.clipboard.writeText(url).then(() => {
                    button.textContent = 'Link Copied';
                    setTimeout(() => button.textContent = 'Share', 1500);
                }).catch(() => alert('Link copied manually.'));

                selectedCountSpan.textContent = `${count} selected`;
            } else {
                batchBar.classList.remove('show');
            }
            // Update section "select all" checkboxes state
            updateSectionSelectAllState();
        }

        function updateSectionSelectAllState() {
            const sections = ['stream-links', 'stream-download-links', 'download-links', 'cloud-links'];
            sections.forEach(sectionId => {
                const container = document.getElementById(sectionId);
                if (!container) return;
                const checkboxes = container.querySelectorAll('.link-check');
                const checked = container.querySelectorAll('.link-check:checked');
                const sectionCheck = document.querySelector(`.section-select-all[data-section="${sectionId.replace('-links','')}"]`);
                if (sectionCheck) {
                    if (checked.length === checkboxes.length && checkboxes.length > 0) {
                        sectionCheck.checked = true;
                        sectionCheck.indeterminate = false;
                    } else if (checked.length > 0) {
                        sectionCheck.checked = false;
                        sectionCheck.indeterminate = true;
                    } else {
                        sectionCheck.checked = false;
                        sectionCheck.indeterminate = false;
                    }
                }
            });
            // Update global select all button text (optional)
            const totalCheckboxes = document.querySelectorAll('.link-check').length;
            const totalChecked = document.querySelectorAll('.link-check:checked').length;
            if (totalChecked === totalCheckboxes) {
                globalSelectAllBtn.textContent = '☒ Deselect All';
            } else {
                globalSelectAllBtn.textContent = '☑ Select All Links';
            }
        }

        // Event listeners for checkboxes
        allCheckboxes.forEach(cb => cb.addEventListener('change', updateBatchBar));

        // Section select all
        sectionSelectAllCheckboxes.forEach(sectionCheck => {
            sectionCheck.addEventListener('change', function(e) {
                const section = this.dataset.section;
                let containerId;
                if (section === 'stream') containerId = 'stream-links';
                else if (section === 'streamdl') containerId = 'stream-download-links';
                else if (section === 'download') containerId = 'download-links';
                else if (section === 'cloud') containerId = 'cloud-links';
                else return;
                
                const container = document.getElementById(containerId);
                if (!container) return;
                const checkboxes = container.querySelectorAll('.link-check');
                const isChecked = this.checked;
                checkboxes.forEach(cb => cb.checked = isChecked);
                updateBatchBar();
            });
        });

        // Global select all
        globalSelectAllBtn.addEventListener('click', function() {
            const allCb = document.querySelectorAll('.link-check');
            const totalChecked = document.querySelectorAll('.link-check:checked').length;
            const shouldCheck = totalChecked !== allCb.length;
            allCb.forEach(cb => cb.checked = shouldCheck);
            updateBatchBar();
        });

        // Clear selection
        clearSelectionBtn.addEventListener('click', function() {
            document.querySelectorAll('.link-check').forEach(cb => cb.checked = false);
            document.querySelectorAll('.section-select-all').forEach(sc => {
                sc.checked = false;
                sc.indeterminate = false;
            });
            updateBatchBar();
        });

        // Batch copy
        batchCopyBtn.addEventListener('click', function() {
            const checked = document.querySelectorAll('.link-check:checked');
            if (checked.length === 0) return;
            
            let textToCopy = '';
            checked.forEach(cb => {
                const name = cb.dataset.name;
                const url = cb.dataset.url;
                textToCopy += `${name} - ${url}\n`;
            });
            
            navigator.clipboard.writeText(textToCopy.trim()).then(() => {
                batchCopyBtn.textContent = '✓ Copied!';
                setTimeout(() => batchCopyBtn.textContent = '📋 Copy Selected', 1500);
            }).catch(() => alert('Copy failed'));
        });

        // Batch share
        batchShareBtn.addEventListener('click', async function() {
            const checked = document.querySelectorAll('.link-check:checked');
            if (checked.length === 0) return;
            
            let shareText = '';
            checked.forEach(cb => {
                shareText += `${cb.dataset.name}: ${cb.dataset.url}\n`;
            });
            
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: 'Nirankari Sant Samagam Links',
                        text: shareText,
                    });
                } catch (err) {
                    if (err.name !== 'AbortError') fallbackCopy(shareText);
                }
            } else {
                fallbackCopy(shareText);
            }
            
            function fallbackCopy(text) {
                navigator.clipboard.writeText(text).then(() => {
                    batchShareBtn.textContent = '✓ Links Copied';
                    setTimeout(() => batchShareBtn.textContent = '📤 Share Selected', 1500);
                }).catch(() => alert('Unable to share, links copied to clipboard manually.'));
            }
        });

        // Initialize indeterminate state (some browsers need explicit set)
        updateBatchBar();
    })();
</script>
</body>
</html>
