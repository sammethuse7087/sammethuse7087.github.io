        // Helper to render section
        function renderSection(containerId, items, showLoginBadge = false) {
            const container = document.getElementById(containerId);
            if (!container) return;
            container.innerHTML = '';
            items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'link-item';

                // Icon logic
                let icon = '🔗';
                const n = item.name.toLowerCase();
                if (n.includes('rumble')||n.includes('vimeo')||n.includes('dailymotion')) icon = '🎬';
                else if (n.includes('drive')||n.includes('mega')||n.includes('dropbox')||n.includes('cloud')) icon = '☁️';
                else if (n.includes('download')||n.includes('mediafire')) icon = '⬇️';
                else icon = '📁';

                const loginTag = showLoginBadge ? '<span class="notice-tag">Login required</span>' : '';

                div.innerHTML = `
                    <div class="link-info">
                        <span class="platform-icon">${icon}</span>
                        <div class="link-details">
                            <div class="link-title">${item.name} ${loginTag}</div>
                            <div class="link-url">${item.url}</div>
                        </div>
                    </div>
                    <div class="actions">
                        <a href="${item.url}" target="_blank" rel="noopener noreferrer" class="btn btn-primary">Open</a>
                        <button class="btn copy-btn" data-url="${item.url}">Copy</button>
                        <button class="btn btn-share share-btn" data-url="${item.url}" data-title="${item.name}">Share</button>
                    </div>
                `;
                container.appendChild(div);
            });

            // Attach event listeners for copy and share
            container.querySelectorAll('.copy-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const url = btn.getAttribute('data-url');
                    try {
                        await navigator.clipboard.writeText(url);
                        btn.textContent = '✓ Copied';
                        setTimeout(() => btn.textContent = 'Copy', 1500);
                    } catch {
                        alert('Unable to copy. Please do it manually.');
                    }
                });
            });

            container.querySelectorAll('.share-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const url = btn.getAttribute('data-url');
                    const title = btn.getAttribute('data-title');
                    if (navigator.share) {
                        try {
                            await navigator.share({
                                title: title,
                                text: `Check out: ${title}`,
                                url: url,
                            });
                        } catch (err) {
                            if (err.name !== 'AbortError') {
                                fallbackCopy(url, btn);
                            }
                        }
                    } else {
                        fallbackCopy(url, btn);
                    }
                });
            });

            function fallbackCopy(url, button) {
                navigator.clipboard.writeText(url).then(() => {
                    button.textContent = 'Link Copied';
                    setTimeout(() => button.textContent = 'Share', 1500);
                }).catch(() => alert('Link copied manually.'));
            }
