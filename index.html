<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nirankari Samagam</title>

<style>
body {
  margin:0;
  font-family:Segoe UI;
  background:#050510;
  color:white;
}

/* HEADER */
header {
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
}

h1{
  color:#00fff2;
  text-shadow:0 0 10px #00fff2;
}

/* SEARCH */
input{
  padding:8px;
  border-radius:10px;
  border:none;
}

/* PLAYER */
iframe{
  width:100%;
  height:250px;
  border:none;
  border-radius:12px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:10px;
  padding:10px;
}

.card{
  background:rgba(255,255,255,0.05);
  padding:10px;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
  transition:0.3s;
}

.card:hover{
  box-shadow:0 0 15px #00fff2;
  transform:scale(1.05);
}

/* STATUS */
.live{color:lime;font-size:12px;}
.dead{color:red;font-size:12px;}

.section{
  padding:10px;
}

h2{
  color:#ff00ff;
}

/* MOBILE */
@media(max-width:600px){
  iframe{height:200px;}
}
</style>

</head>

<body>

<header>
<h1>🔥 Nirankari</h1>
<input type="text" id="search" placeholder="Search...">
</header>

<!-- PLAYER -->
<div style="padding:10px">
<iframe id="player"></iframe>
</div>

<!-- SECTIONS -->
<div id="content"></div>

<script>

/* DATA FROM YOUR FILE */
const data = {
"Stream Only":[
"https://rumble.com/v74yo2q-78th-nirankari-sant-samagam-2025.html",
"https://d.tube/watch/JQcxsWnJRxKhT7Y32CUDiJ",
"https://rutube.ru/video/1ff6e81b493f43252f14f66584d51e04/",
"https://m.vkvideo.ru/video-235745371_456239017",
"https://vimeo.com/1159540263"
],

"Stream & Download":[
"https://streamruby.com/m00wtf3n2ypy.html",
"https://archive.org/details/78th-nirankari-samagum-2025",
"https://krakenfiles.com/view/JzQoPeA9lK/file.html"
],

"Download":[
"https://mediafire.com",
"https://filemoon.org",
"https://bestfile.io"
],

"Login Required":[
"https://1024terabox.com",
"https://mypikpak.com",
"https://4shared.com"
]
};

/* RENDER */
let html="";
for(let key in data){
html+=`<div class="section">
<h2>${key} (${data[key].length})</h2>
<div class="grid">`;

data[key].forEach(link=>{
html+=`<div class="card" onclick="play('${link}')">
${new URL(link).hostname}
<div class="status">checking...</div>
</div>`;
});

html+=`</div></div>`;
}

document.getElementById("content").innerHTML=html;

/* PLAYER */
function play(url){
document.getElementById("player").src=url;
}

/* SEARCH */
document.getElementById("search").onkeyup=function(){
let val=this.value.toLowerCase();
document.querySelectorAll(".card").forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(val)?"block":"none";
});
};

/* AUTO CHECK */
document.querySelectorAll(".card").forEach(card=>{
fetch(card.innerText,{mode:"no-cors"})
.then(()=>card.querySelector(".status").innerHTML="<span class='live'>● Live</span>")
.catch(()=>card.querySelector(".status").innerHTML="<span class='dead'>● Dead</span>");
});

</script>

</body>
</html>
