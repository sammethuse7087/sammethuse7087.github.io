                { name: "pCloud", url: "https://e.pcloud.link/publink/show?code=kZ701AZLKADbBmtCXumiLVKfn54JQX32MKy" },
                { name: "MediaFire", url: "https://www.mediafire.com/folder/ffz29cwk5cdzx/78th+Nirankari+Sant+Samagam+2025" },
                { name: "Fireload", url: "https://www.fireload.com/721a50ebb232aaed/78th_Nirankari_Sant_Samagaam.mp4" },
                { name: "UploadFlix", url: "https://dl.uploadflix.com/ix77dqeqx4eh" },
                { name: "Filemoon", url: "https://filemoon.org/LJlGn9bZz15w/file" },
                { name: "BestFile 1", url: "https://bestfile.io/en/2qzP33JsNLhGfTM/file" },
                { name: "BestFile 2", url: "https://bestfile.io/en/a8LrSnKoqcs32zh/file" },
                { name: "Febbox 1", url: "https://www.febbox.com/share/uQzP3dJx" },
                { name: "Febbox 2", url: "https://www.febbox.com/share/rAZTXkYU" },
                { name: "Febbox 3", url: "https://www.febbox.com/share/fUURuOv1" }
            ]},
            { title: '☁️ Cloud Login', id: 'cloud', links: [
                { name: "TeraBox 1", url: "https://1024terabox.com/s/1SSb9KoDya6s7eEwf15V-Sw?op_source=goldsharelink" },
                { name: "TeraBox 2", url: "https://1024terabox.com/s/1-nP_rfoakPFrL1jc5tVcQA" },
                { name: "PikPak", url: "https://mypikpak.com/s/VOf8SVLzieb2uLOpgrwMCv74o2" },
                { name: "4Shared", url: "https://www.4shared.com/folder/ldxhi-wS/78th_Nirankari_Sant_Samagam_20.html" },
                { name: "Dailymotion", url: "https://dai.ly/x9yofzm" }
            ]}
        ];

        // Global state
        let currentContextLink = null;
        let serialCounter = 1;
        const clickCounts = JSON.parse(localStorage.getItem('linkClickCounts')) || {};

        // Helper functions
        function getDomain(url) {
            try { return new URL(url).hostname.replace(/^www\./, ''); } catch { return ''; }
        }

        function getFaviconUrl(domain) {
            return domain ? `https://icons.duckduckgo.com/ip3/${domain}.ico` : '';
        }

        function incrementClick(url) {
            clickCounts[url] = (clickCounts[url] || 0) + 1;
            localStorage.setItem('linkClickCounts', JSON.stringify(clickCounts));
            return clickCounts[url];
        }

        function openLink(url) {
            incrementClick(url);
            window.open(url, '_blank');
            // Update display for that link's counter
            const counterSpan = document.querySelector(`.click-count[data-url="${url}"]`);
            if (counterSpan) counterSpan.textContent = clickCounts[url] || 0;
        }

        // Render all sections
        const container = document.getElementById('sections-container');
        container.innerHTML = '';
        sections.forEach(section => {
            const sectionDiv = document.createElement('div');
            sectionDiv.className = 'section';
            sectionDiv.dataset.category = section.id;
            sectionDiv.innerHTML = `
                <div class="section-header">
                    <h2>${section.title} <span class="badge-count">${section.links.length} Links</span></h2>
                    <label class="select-all-section">
                        <input type="checkbox" class="section-select-all" data-section="${section.id}"> Select All
                    </label>
                </div>
                <div class="link-grid" id="${section.id}-links"></div>
            `;
            container.appendChild(sectionDiv);

            const grid = document.getElementById(`${section.id}-links`);
            section.links.forEach((link, idx) => {
                const domain = getDomain(link.url);
                const faviconUrl = getFaviconUrl(domain);
                const itemDiv = document.createElement('div');
                itemDiv.className = 'link-item';
                itemDiv.dataset.url = link.url;
                itemDiv.dataset.name = link.name;
                
                const serial = serialCounter++;
                const clickCount = clickCounts[link.url] || 0;
                const loginBadge = section.id === 'cloud' ? '<span class="notice-tag">Login required</span>' : '';

                itemDiv.innerHTML = `
                    <div class="link-checkbox">
                        <input type="checkbox" class="link-check" data-url="${link.url}" data-name="${link.name}">
                    </div>
                    <div class="link-serial">${serial}.</div>
                    <div class="link-info">
                        <span class="platform-icon">
                            <img src="${faviconUrl}" alt="" onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';" loading="lazy">
                            <span style="display:none; font-size:1.2rem;">🔗</span>
                        </span>
                        <div class="link-details">
                            <div class="link-title">${link.name} ${loginBadge}</div>
                            <div class="link-url">${link.url}</div>
                        </div>
                    </div>
                    <div class="link-stats">
                        <div class="status-indicator">
                            <span class="status-dot" data-url="${link.url}" title="Click to re-check"></span>
                            <button class="recheck-btn" data-url="${link.url}" title="Check status">⟳</button>
                        </div>
                        <div class="click-counter">
                            <span>👁️</span>
                            <span class="click-count" data-url="${link.url}">${clickCount}</span>
                        </div>
                    </div>
                    <div class="actions">
                        <button class="btn btn-primary open-btn">Open</button>
                        <button class="btn copy-btn">Copy</button>
                        <button class="btn btn-share share-btn">Share</button>
                    </div>
                `;
                grid.appendChild(itemDiv);
            });
        });

        // Now attach event listeners
        const allLinkItems = document.querySelectorAll('.link-item');
        const contextMenu = document.getElementById('contextMenu');
        let longPressTimer;
        
        // Context menu actions
        contextMenu.addEventListener('click', (e) => {
            const action = e.target.closest('[data-action]')?.dataset.action;
            if (!action || !currentContextLink) return;
            const url = currentContextLink.dataset.url;
            if (action === 'open') openLink(url);
            else if (action === 'copy') {
                navigator.clipboard.writeText(url).then(() => alert('Link copied!'));
            } else if (action === 'share') {
                if (navigator.share) {
                    navigator.share({ title: currentContextLink.dataset.name, url });
                } else {
                    navigator.clipboard.writeText(url).then(() => alert('Link copied (share not supported)'));
                }
            }
            contextMenu.classList.remove('show');
        });

        // Hide context menu on outside click
        document.addEventListener('click', () => contextMenu.classList.remove('show'));
        document.addEventListener('contextmenu', (e) => {
            if (!e.target.closest('.link-item')) contextMenu.classList.remove('show');
        });

        // Link item interactions
        allLinkItems.forEach(item => {
            const url = item.dataset.url;
            
            // Tile click to open (avoid if clicking on buttons/checkbox)
            item.addEventListener('click', (e) => {
                if (e.target.closest('button, a, input, .status-dot, .recheck-btn')) return;
                openLink(url);
            });

            // Long press for mobile
            item.addEventListener('touchstart', (e) => {
                if (e.target.closest('button, a, input')) return;
                longPressTimer = setTimeout(() => {
                    currentContextLink = item;
                    const touch = e.touches[0];
                    contextMenu.style.left = touch.clientX + 'px';
                    contextMenu.style.top = touch.clientY + 'px';
                    contextMenu.classList.add('show');
                }, 500);
            });
            item.addEventListener('touchend', () => clearTimeout(longPressTimer));
            item.addEventListener('touchmove', () => clearTimeout(longPressTimer));

            // Right-click
            item.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                currentContextLink = item;
                contextMenu.style.left = e.clientX + 'px';
                contextMenu.style.top = e.clientY + 'px';
                contextMenu.classList.add('show');
            });

            // Buttons
            item.querySelector('.open-btn').addEventListener('click', (e) => { e.stopPropagation(); openLink(url); });
            item.querySelector('.copy-btn').addEventListener('click', (e) => {
                e.stopPropagation();
                navigator.clipboard.writeText(url).then(() => {
                    const btn = e.target;
                    btn.textContent = '✓';
                    setTimeout(() => btn.textContent = 'Copy', 1000);
                });
            });
            item.querySelector('.share-btn').addEventListener('click', (e) => {
                e.stopPropagation();
                if (navigator.share) {
                    navigator.share({ title: item.dataset.name, url });
                } else {
                    navigator.clipboard.writeText(url).then(() => alert('Link copied!'));
                }
            });
        });

        // Status checker
        async function checkLinkStatus(url, dotElement) {
            dotElement.classList.add('checking');
            dotElement.classList.remove('live', 'dead');
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 5000);
                // Try to fetch with no-cors to see if reachable
                await fetch(url, { mode: 'no-cors', signal: controller.signal });
                clearTimeout(timeoutId);
                dotElement.classList.add('live');
            } catch {
                dotElement.classList.add('dead');
            } finally {
                dotElement.classList.remove('checking');
            }
        }

        document.querySelectorAll('.status-dot').forEach(dot => {
            const url = dot.dataset.url;
            checkLinkStatus(url, dot);
            dot.addEventListener('click', (e) => {
                e.stopPropagation();
                checkLinkStatus(url, dot);
            });
        });

        document.querySelectorAll('.recheck-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const url = btn.dataset.url;
                const dot = btn.parentElement.querySelector('.status-dot');
                checkLinkStatus(url, dot);
            });
        });

        // Theme switcher
        const themeOptions = document.querySelectorAll('.theme-option');
        const html = document.documentElement;
        themeOptions.forEach(opt => {
            opt.addEventListener('click', () => {
                const theme = opt.dataset.theme;
                html.setAttribute('data-theme', theme);
                themeOptions.forEach(o => o.classList.remove('active'));
                opt.classList.add('active');
                localStorage.setItem('theme', theme);
            });
        });
        const savedTheme = localStorage.getItem('theme') || 'dark';
        html.setAttribute('data-theme', savedTheme);
        themeOptions.forEach(o => o.classList.toggle('active', o.dataset.theme === savedTheme));

        // Batch selection logic (same as before but adapted)
        const batchBar = document.getElementById('batchBar');
        const selectedCountSpan = document.getElementById('selectedCount');
        const allChecks = document.querySelectorAll('.link-check');
        const sectionSelects = document.querySelectorAll('.section-select-all');
        const globalSelectBtn = document.getElementById('globalSelectAllBtn');

        function updateBatchUI() {
            const checked = document.querySelectorAll('.link-check:checked');
            const count = checked.length;
            batchBar.classList.toggle('show', count > 0);
            selectedCountSpan.textContent = `${count} selected`;
            
            sectionSelects.forEach(select => {
                const sectionId = select.dataset.section;
                const checks = document.querySelectorAll(`#${sectionId}-links .link-check`);
                const checkedInSection = document.querySelectorAll(`#${sectionId}-links .link-check:checked`);
                if (checks.length === 0) return;
                if (checkedInSection.length === checks.length) {
                    select.checked = true;
                    select.indeterminate = false;
                } else if (checkedInSection.length > 0) {
                    select.checked = false;
                    select.indeterminate = true;
                } else {
                    select.checked = false;
                    select.indeterminate = false;
                }
            });
            
            const total = allChecks.length;
            const totalChecked = checked.length;
            globalSelectBtn.textContent = totalChecked === total ? '☒ Deselect All' : '☑ Select All Links';
        }

        allChecks.forEach(cb => cb.addEventListener('change', updateBatchUI));
        
        sectionSelects.forEach(select => {
            select.addEventListener('change', function() {
                const sectionId = this.dataset.section;
                const checks = document.querySelectorAll(`#${sectionId}-links .link-check`);
                checks.forEach(cb => cb.checked = this.checked);
                updateBatchUI();
            });
        });

        globalSelectBtn.addEventListener('click', () => {
            const shouldCheck = !(document.querySelectorAll('.link-check:checked').length === allChecks.length);
            allChecks.forEach(cb => cb.checked = shouldCheck);
            updateBatchUI();
        });

        document.getElementById('clearSelectionBtn').addEventListener('click', () => {
            allChecks.forEach(cb => cb.checked = false);
            updateBatchUI();
        });

        document.getElementById('batchCopyBtn').addEventListener('click', () => {
            const checked = document.querySelectorAll('.link-check:checked');
            if (!checked.length) return;
            let text = '';
            checked.forEach(cb => text += `${cb.dataset.name} - ${cb.dataset.url}\n`);
            navigator.clipboard.writeText(text).then(() => alert('Copied selected links!'));
        });

        document.getElementById('batchShareBtn').addEventListener('click', () => {
            const checked = document.querySelectorAll('.link-check:checked');
            if (!checked.length) return;
            let text = '';
            checked.forEach(cb => text += `${cb.dataset.name}: ${cb.dataset.url}\n`);
            if (navigator.share) {
                navigator.share({ title: 'Selected Links', text });
            } else {
                navigator.clipboard.writeText(text).then(() => alert('Copied to clipboard!'));
            }
        });

        updateBatchUI();
    })();
</script>
</body>
</html>
